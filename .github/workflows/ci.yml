name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build & Verify Data
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify in-app data integrity
        run: npm run verify:data

      - name: Validate sample import fixtures
        run: npm run validate:samples

      - name: Validate invalid fixture (must fail)
        # The invalid sample MUST be rejected — if the validator passes it,
        # the CI run fails too, proving the validator catches bad data.
        run: |
          if node scripts/importers/validate-import.mjs fixtures/import-samples/invalid-sample.json --dry-run; then
            echo "::error::Invalid sample was accepted; validator is broken."
            exit 1
          else
            echo "Invalid sample correctly rejected."
          fi

      - name: Validate Quran sample (valid file)
        # Ensures validate-quran-json.mjs accepts a well-formed Quran JSON sample.
        run: npm run validate:quran-sample

      - name: Validate Quran invalid sample (must fail)
        # The invalid Quran sample MUST be rejected (duplicates, ayah > max, empty text, etc.).
        # If the validator passes it, CI fails — proving the validator catches bad data.
        run: |
          if node scripts/importers/validate-quran-json.mjs fixtures/import-samples/quran-invalid-sample.json --dry-run; then
            echo "::error::Invalid Quran sample was accepted; validator is broken."
            exit 1
          else
            echo "Invalid Quran sample correctly rejected."
          fi

      - name: D1 smoke check (dry-run, no Cloudflare secrets)
        # Verifies seed SQL + migrations exist and prints the commands needed
        # to load them into a real D1 instance. Does NOT require any secret.
        run: npm run d1:smoke

      - name: Export seed → SQL/JSON (seed-to-d1)
        # Generates dist/import/seed-data.sql and seed-data.json.
        # Step also enforces internal validation; fails on schema/whitelist errors.
        run: npm run export:seed-sql

      - name: Check generated SQL has no 'undefined' / 'NaN'
        # Defensive guard: if any literal undefined/NaN slipped into SQL,
        # we fail CI immediately so prod imports never load corrupt data.
        run: |
          if grep -E "\bundefined\b|\bNaN\b" dist/import/seed-data.sql; then
            echo "::error::Generated SQL contains forbidden values (undefined/NaN)."
            exit 1
          fi
          echo "SQL is clean."

      - name: Run unit tests
        run: npm test

      - name: Run Quran importer (sample, allow-partial)
        # Generates dist/import/ayahs-sample.sql + report from a tiny
        # fixture. This proves the importer wiring works end-to-end.
        run: npm run import:quran:sample

      - name: Check importer SQL has no 'undefined' / 'NaN'
        # Defensive guard for the Quran importer output as well —
        # even a single literal undefined/NaN must abort CI.
        run: |
          if grep -E "\bundefined\b|\bNaN\b" dist/import/ayahs-sample.sql; then
            echo "::error::Importer SQL contains forbidden values (undefined/NaN)."
            exit 1
          fi
          if grep -E "\"text\"\\s*:\\s*(null|\"undefined\"|\"NaN\")" dist/import/quran-import-report.json; then
            echo "::error::Importer JSON report contains forbidden values."
            exit 1
          fi
          echo "Importer artefacts are clean."

      - name: Reject Quran importer on invalid sample (must fail)
        # The invalid Quran fixture MUST be rejected by the importer
        # (duplicates, ayah > max, http://, undefined text, etc.).
        run: |
          if node scripts/importers/import-quran.mjs fixtures/import-samples/quran-invalid-sample.json --allow-partial --strict; then
            echo "::error::Invalid Quran fixture was accepted by the importer."
            exit 1
          fi
          echo "Invalid fixture correctly rejected by importer."

      - name: Build (Cloudflare Pages)
        run: npm run build

      - name: Smoke check build artefacts
        run: |
          test -f dist/_worker.js
          test -d dist/static || true
          test -f dist/import/seed-data.sql
          test -f dist/import/seed-data.json
          test -f dist/import/ayahs-sample.sql
          test -f dist/import/quran-import-report.json
          echo "Build artefacts look OK."
